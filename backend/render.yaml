services:
  - type: web
    name: nexaproductivity-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: PORT
        value: 4000
      - key: CORS_ORIGINS
        sync: false
    healthCheckPath: /health
